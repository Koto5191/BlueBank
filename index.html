<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>KotokiBank</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <div class="card">
    <h1>🏦 KotokiBank</h1>
    <button class="theme-toggle" onclick="toggleTheme()">🌙 ダーク</button>

    <!-- カードイラスト -->
    <div class="card-illust-wrap">
      <button class="illust-arrow left" onclick="prevIllust()">‹</button>
      <img class="card-illust" id="card-illust" src="card1.png" alt="card" />
      <button class="illust-arrow right" onclick="nextIllust()">›</button>
    </div>

    <!-- 口座タブ -->
    <div class="tabs">
      <button class="tab active" id="tab-normal" onclick="switchAccount('normal')">通常口座</button>
      <button class="tab" id="tab-savings" onclick="switchAccount('savings')">貯金口座</button>
    </div>

    <div>残高</div>
    <div class="balance" id="balance">¥0</div>
    <div id="next-goal"></div>

    <input type="number" id="amount" placeholder="金額を入力" />

    <br>

    <button class="deposit" onclick="deposit()">入金</button>
    <button class="withdraw" onclick="withdraw()">出金</button>

    <h3>📜 履歴</h3>
    <ul id="history"></ul>
  </div>

<script>
/* =========================
   🔥 Firebase初期化
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyBnbPO7vnZg4ohzCQqTjML4u0Gt2rvX17w",
  authDomain: "bluebank-5191.firebaseapp.com",
  projectId: "bluebank-5191",
  storageBucket: "bluebank-5191.firebasestorage.app",
  messagingSenderId: "898172429411",
  appId: "1:898172429411:web:51198f69778744fa2a4456"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* =========================
   🏦 状態
========================= */
let accounts = {
  normal:  { balance: 0, history: [] },
  savings: { balance: 0, history: [] }
};
let currentAccount = localStorage.getItem("currentAccount") || "normal";

function current() {
  return accounts[currentAccount];
}

/* =========================
   🖼 イラスト
========================= */
const ILLUST_COUNT = 4;
let illustIndex = Number(localStorage.getItem("illustIndex") || 0);

function updateIllust() {
  document.getElementById("card-illust").src = "card" + (illustIndex + 1) + ".png";
  localStorage.setItem("illustIndex", illustIndex);
}

function prevIllust() {
  illustIndex = (illustIndex - 1 + ILLUST_COUNT) % ILLUST_COUNT;
  updateIllust();
}

function nextIllust() {
  illustIndex = (illustIndex + 1) % ILLUST_COUNT;
  updateIllust();
}

/* =========================
   🔀 口座切替
========================= */
function switchAccount(type) {
  currentAccount = type;
  localStorage.setItem("currentAccount", type);

  document.getElementById("tab-normal").classList.toggle("active", type === "normal");
  document.getElementById("tab-savings").classList.toggle("active", type === "savings");

  render();
}

/* =========================
   📥 初期ロード
========================= */
window.onload = async function () {
  // テーマ復元
  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
    document.querySelector(".theme-toggle").innerText = "☀️ ライト";
  }

  // イラスト復元
  updateIllust();

  // タブ復元
  document.getElementById("tab-normal").classList.toggle("active", currentAccount === "normal");
  document.getElementById("tab-savings").classList.toggle("active", currentAccount === "savings");

  // Firebase読み込み
  const normalDoc  = await db.collection("bank").doc("normal").get();
  const savingsDoc = await db.collection("bank").doc("savings").get();

  if (normalDoc.exists) {
    accounts.normal.balance  = normalDoc.data().balance || 0;
    accounts.normal.history  = normalDoc.data().history || [];
  }
  if (savingsDoc.exists) {
    accounts.savings.balance  = savingsDoc.data().balance || 0;
    accounts.savings.history  = savingsDoc.data().history || [];
  }

  render();
};

/* =========================
   🎨 画面更新
========================= */
function render() {
  const { balance, history } = current();

  const balanceEl = document.getElementById("balance");
  balanceEl.classList.remove("pop");
  void balanceEl.offsetWidth;
  balanceEl.classList.add("pop");
  balanceEl.innerText = "¥" + balance.toLocaleString();

  const nextMan = Math.ceil((balance + 1) / 10000) * 10000;
  const diff = nextMan - balance;
  document.getElementById("next-goal").innerText = "あと¥" + diff.toLocaleString() + "で" + (nextMan / 10000) + "万円！";

  const list = document.getElementById("history");
  list.innerHTML = "";
  history.slice().reverse().forEach(text => {
    const li = document.createElement("li");
    li.innerText = text;
    list.appendChild(li);
  });
}

/* =========================
   💾 保存（Firebase）
========================= */
function save() {
  const { balance, history } = current();
  db.collection("bank").doc(currentAccount).set({ balance, history });
}

/* =========================
   📦 金額取得
========================= */
function getAmount() {
  return Number(document.getElementById("amount").value);
}

/* =========================
   📜 履歴追加
========================= */
function addHistory(text) {
  current().history.push(text);
}

/* =========================
   💰 入金
========================= */
function deposit() {
  const amount = getAmount();

  if (!amount || amount <= 0) {
    addHistory("⚠ 正しい金額を入力してね");
    render(); save(); return;
  }

  current().balance += amount;
  addHistory("＋ ¥" + amount.toLocaleString() + " 入金");
  render(); save();
}

/* =========================
   💸 出金
========================= */
function withdraw() {
  const amount = getAmount();

  if (!amount || amount <= 0) {
    addHistory("⚠ 正しい金額を入力してね");
    render(); save(); return;
  }

  if (current().balance < amount) {
    addHistory("⚠ 残高不足で失敗");
    render(); save(); return;
  }

  current().balance -= amount;
  addHistory("－ ¥" + amount.toLocaleString() + " 出金");
  render(); save();
}

/* =========================
   🌙 テーマ切替
========================= */
function toggleTheme() {
  const isDark = document.body.classList.toggle("dark");
  document.querySelector(".theme-toggle").innerText = isDark ? "☀️ ライト" : "🌙 ダーク";
  localStorage.setItem("theme", isDark ? "dark" : "light");
}
</script>

</body>
</html>
